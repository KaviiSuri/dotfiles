# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing - vim-style (hold to resize)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom and reload
bind z resize-pane -Z
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Window switching (1-9)
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9

# Session manager - tmux-fzf
bind f run-shell -b "~/.tmux/plugins/tmux-fzf/main.sh"

# New session
bind N command-prompt -p "session name:" "new-session -s '%%'"

# Layout shortcuts
bind -n M-1 run-shell "tmux split-window -h -c '#{pane_current_path}'; tmux split-window -v -c '#{pane_current_path}'; tmux select-layout '60,40,0,0'; tmux select-pane -t 0"
bind -n M-2 run-shell "tmux split-window -v -c '#{pane_current_path}'"

# tmux-fingers - highlight clickable items (URLs, paths, etc)
bind @ run -b "#{@fingers-cli} start #{pane_id}"
