# Machine-local overrides and temporary experiments belong here.

# Window status format - override Tokyo Night plugin
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator " "

# tmux-agent-indicator settings (load after plugins)
run-shell '~/.tmux/plugins/tmux-agent-indicator/agent-indicator.tmux'

# Agent indicator: show in status bar
set -g status-right '#{agent_indicator} | %H:%M'
set -g status-left '#{agent_session_dots} #{?client_prefix, Prefix ,}#S |'

# Agent indicator colors for Tokyo Night
set -g @agent-indicator-border-enabled 'on'
set -g @agent-indicator-running-border 'colour69'
set -g @agent-indicator-needs-input-border 'colour214'
set -g @agent-indicator-done-border 'colour70'
