# Source modular tmux config in a fixed, readable order.
source-file ~/.config/tmux/terminal.conf
source-file ~/.config/tmux/options.conf
source-file ~/.config/tmux/keys.conf
source-file ~/.config/tmux/layouts.conf
source-file ~/.config/tmux/status.conf
source-file ~/.config/tmux/copy-mode.conf
source-file ~/.config/tmux/mouse.conf
source-file ~/.config/tmux/plugins.conf
source-file ~/.config/tmux/persistence.conf
source-file ~/.config/tmux/local.conf
