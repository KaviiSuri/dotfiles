# Core tmux behavior. Keep these boring and predictable.
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

set -g history-limit 100000
set -g escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Stable names are easier to navigate than constantly changing ones.
set -g allow-rename off
set -g automatic-rename off

# New panes and windows should stay in the current working directory.
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Split shortcuts (matching user's WezTerm setup)
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
