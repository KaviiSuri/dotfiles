# Tokyo Night styling with a restrained bottom status line.
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g message-style "bg=#7aa2f7,fg=#1a1b26"
set -g message-command-style "bg=#7aa2f7,fg=#1a1b26"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g window-status-style "bg=#1a1b26,fg=#565f89"
set -g window-status-current-style "bg=#24283b,fg=#c0caf5,bold"
set -g window-status-activity-style "bg=#1a1b26,fg=#e0af68"
set -g window-status-bell-style "bg=#1a1b26,fg=#f7768e,bold"

# Window status format - override Tokyo Night plugin
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator " "

set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#7aa2f7,bold]#S #{prefix_highlight}#[fg=#565f89]|"
set -g status-right "#[fg=#565f89]%H:%M #[default]"

# Prefix highlight - use simple text instead of special chars
set -g @prefix_highlight_empty_attr "fg=#565f89"
set -g @prefix_highlight_active_attr "fg=#7aa2f7"
set -g @prefix_highlight_copy_attr "fg=#e0af68"
set -g @prefix_highlight_sync_attr "fg=#f7768e"
set -g @prefix_highlight_empty " Prefix "
set -g @prefix_highlight_active " WAIT "
set -g @prefix_highlight_copy " COPY "
set -g @prefix_highlight_sync " SYNC "